<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkSphere | Retro</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #000080; color: #fff; font-family: 'VT323', monospace; padding: 50px; }
        .window { background: #c0c0c0; color: #000; border: 4px solid #fff; padding: 20px; box-shadow: 10px 10px 0 #000; }
        h1 { font-size: 4rem; }
        .btn { padding: 10px 20px; background: #c0c0c0; border: 4px outset #fff; cursor: pointer; text-decoration: none; color: #000; }
    </style>
</head>
<body>
    <div class="window">
        <h1>Welcome to WorkSphere</h1>
        <p>Version 1.0 (Built 1995)</p>
        <br>
        <a href="/dashboard" class="btn">RUN.EXE</a>
    </div>
</body>
</html>
